<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slide 1 — Ceres: Discovered &amp; Lost</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W, H;

function resize() {
  W = cv.width = window.innerWidth;
  H = cv.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); ORBIT_CIRC = null; ORBIT_LSQ = null; });

// ── Helpers ──────────────────────────────────────────────────────────────────
function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function clamp(v,a,b) { return Math.max(a,Math.min(b,v)); }
function fade(t,a,b) { return ease(clamp((t-a)/(b-a),0,1)); }
function lerp(a,b,t) { return a+(b-a)*t; }
function hex2rgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

// ── Stars ─────────────────────────────────────────────────────────────────────
const STARS = Array.from({length:600}, () => ({
  rx: Math.random(),
  ry: Math.random() * 0.84,
  r:  Math.random()<0.05 ? Math.random()*1.6+1.5
    : Math.random()<0.25 ? Math.random()*0.8+0.6
    : Math.random()*0.4+0.15,
  a:  Math.random()*0.55+0.4,
  ph: Math.random()*Math.PI*2,
  sp: Math.random()*1.5+0.5,
  col: Math.random()<0.08 ? '#FFE8CC' : Math.random()<0.1 ? '#CCDEFF' : '#FFFFFF',
}));

// ── Taurus ────────────────────────────────────────────────────────────────────
const TAU_S = [
  {rx:0.365,ry:0.455,r:4.8,c:'#FF9944'},
  {rx:0.335,ry:0.435,r:1.7,c:'#FFEECC'},
  {rx:0.350,ry:0.415,r:1.9,c:'#FFEECC'},
  {rx:0.385,ry:0.405,r:1.6,c:'#FFEECC'},
  {rx:0.415,ry:0.425,r:1.7,c:'#FFEECC'},
  {rx:0.440,ry:0.360,r:1.9,c:'#CCDDFF'},
  {rx:0.500,ry:0.270,r:2.9,c:'#AACCFF'},
  {rx:0.225,ry:0.290,r:2.5,c:'#88AAFF'},
  {rx:0.210,ry:0.315,r:1.3,c:'#88AAFF'},
  {rx:0.240,ry:0.275,r:1.2,c:'#88AAFF'},
  {rx:0.200,ry:0.285,r:1.1,c:'#88AAFF'},
  {rx:0.250,ry:0.305,r:1.0,c:'#88AAFF'},
  {rx:0.220,ry:0.255,r:1.0,c:'#88AAFF'},
  {rx:0.235,ry:0.330,r:0.9,c:'#88AAFF'},
];
const TAU_L = [[0,1],[1,2],[2,3],[3,0],[0,4],[4,3],[0,5],[5,6]];

// ── Ceres: 19 positions with seeded scatter ───────────────────────────────────
function qbez(t,x0,y0,x1,y1,x2,y2) {
  const m=1-t;
  return {rx:m*m*x0+2*m*t*x1+t*t*x2, ry:m*m*y0+2*m*t*y1+t*t*y2};
}
function xorshift(seed) {
  let s=seed>>>0;
  return ()=>{ s^=s<<13; s^=s>>17; s^=s<<5; return (s>>>0)/4294967296; };
}
const rng = xorshift(1801);
const CP = {x0:0.405,y0:0.500,x1:0.560,y1:0.455,x2:0.725,y2:0.555};
const CERES = Array.from({length:19},(_,i)=>{
  const t=i/18;
  const pt=qbez(t,CP.x0,CP.y0,CP.x1,CP.y1,CP.x2,CP.y2);
  return {rx:pt.rx+(rng()-0.5)*0.018, ry:pt.ry+(rng()-0.5)*0.014};
});

const SUN = {rx:0.825,ry:0.690};

// ── Orbit fits ────────────────────────────────────────────────────────────────
const HILITE     = [0,9,18];
const HILITE_SET = new Set(HILITE);
let   ORBIT_CIRC = null;
let   ORBIT_LSQ  = null;

function circumscribedCircle(x1,y1,x2,y2,x3,y3) {
  const D=2*(x1*(y2-y3)+x2*(y3-y1)+x3*(y1-y2));
  if (Math.abs(D)<1e-6) return null;
  const s1=x1*x1+y1*y1, s2=x2*x2+y2*y2, s3=x3*x3+y3*y3;
  const ux=(s1*(y2-y3)+s2*(y3-y1)+s3*(y1-y2))/D;
  const uy=(s1*(x3-x2)+s2*(x1-x3)+s3*(x2-x1))/D;
  return {cx:ux, cy:uy, r:Math.sqrt((x1-ux)**2+(y1-uy)**2)};
}

function solve3x3(A,b) {
  const M=A.map((row,i)=>[...row,b[i]]);
  for (let c=0;c<3;c++) {
    let mx=c;
    for (let r=c+1;r<3;r++) if(Math.abs(M[r][c])>Math.abs(M[mx][c])) mx=r;
    [M[c],M[mx]]=[M[mx],M[c]];
    for (let r=c+1;r<3;r++) {
      const f=M[r][c]/M[c][c];
      for (let j=c;j<=3;j++) M[r][j]-=f*M[c][j];
    }
  }
  const x=[0,0,0];
  for (let i=2;i>=0;i--) {
    x[i]=M[i][3];
    for (let j=i+1;j<3;j++) x[i]-=M[i][j]*x[j];
    x[i]/=M[i][i];
  }
  return x;
}

function fitCircleLSQ(pts) {
  let Sx=0,Sy=0,Sxx=0,Sxy=0,Syy=0,Szx=0,Szy=0,Sz=0;
  for (const {x,y} of pts) {
    const z=x*x+y*y;
    Sx+=x; Sy+=y; Sxx+=x*x; Sxy+=x*y; Syy+=y*y;
    Szx+=z*x; Szy+=z*y; Sz+=z;
  }
  const N=pts.length;
  const [u,v,w]=solve3x3([[Sxx,Sxy,Sx],[Sxy,Syy,Sy],[Sx,Sy,N]],[Szx,Szy,Sz]);
  const ccx=u/2, ccy=v/2;
  return {cx:ccx, cy:ccy, r:Math.sqrt(w+ccx*ccx+ccy*ccy)};
}

function getOrbit() {
  if (ORBIT_CIRC) return ORBIT_CIRC;
  const p=HILITE.map(i=>({x:CERES[i].rx*W,y:CERES[i].ry*H}));
  ORBIT_CIRC=circumscribedCircle(p[0].x,p[0].y,p[1].x,p[1].y,p[2].x,p[2].y);
  return ORBIT_CIRC;
}
function getLSQOrbit() {
  if (ORBIT_LSQ) return ORBIT_LSQ;
  ORBIT_LSQ=fitCircleLSQ(CERES.map(p=>({x:p.rx*W,y:p.ry*H})));
  return ORBIT_LSQ;
}

// ── Timing (t-units; ÷250ms = 2× original speed) ─────────────────────────────
// Scene 2: first dot + discovery arrow
const DISC0_A    = 2.5;   // dot 0 fades in
const DISC0_B    = 3.0;
const DISCARR_A  = 2.8;   // discovery arrow fades in
const DISCARR_B  = 3.4;
const DISCARR_FA = 3.5;   // arrow fades out (scene 3 resumes)
const DISCARR_FB = 5.0;
// Scene 3: extra dots 1-18
const CER0      = 3.0;
const CERDT     = 0.32;
const CER_END   = CER0+19*CERDT; // same endpoint; 18 extras spread over same span
const ZOOM_A    = 16.5;
const ZOOM_B    = 21.0;
const ELLIPSE_A = 23.5;
const ELLIPSE_B = 28.5;
const ERROR_A   = 28.5;
const ERROR_B   = 33.5;
const EMPH_A    = 33.5;
const EMPH_B    = 37.5;
const REDRAW_A  = 37.5;
const REDRAW_B  = 40.5;
const LSQ_IN_A  = 38.5;
const LSQ_IN_B  = 44.5;
const NEWERR_A  = 44.5;
const NEWERR_B  = 48.5;
const SUNZOOM_A = 48.5;
const SUNZOOM_B = 53.5;
const EXTELL2_A = 53.0;
const EXTELL2_B = 59.0;
const PREDICT_A = 58.5;
const PREDICT_B = 63.0;

// Camera
const CAM0={fx:0.500,fy:0.500,zoom:1.0,angle:0.00};
const CAM1={fx:0.575,fy:0.515,zoom:2.20,angle:-0.10};
const CAM2={fx:0.790,fy:0.670,zoom:2.2,angle:-0.10};

// ── Pause machinery ───────────────────────────────────────────────────────────
let tAccum       = 0;      // accumulated animation time in ms
let lastTs       = null;
let wallT0       = null;
let paused       = false;
let nextPauseIdx = 0;
// t-values at which each scene ends and animation pauses
const PAUSE_POINTS = [2.0, 3.5, CER_END, ZOOM_B,
                      ELLIPSE_B, ERROR_B, EMPH_B, LSQ_IN_B, NEWERR_B, PREDICT_B];

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && paused) {
    paused = false;
    nextPauseIdx++;
    lastTs = null; // prevents delta spike on resume
  }
});

// ── UFO ───────────────────────────────────────────────────────────────────────
function drawUFO(x, y, wt, sz) {
  const s = sz ?? 22;
  const p = 0.78 + 0.22 * Math.sin(wt * 5);
  cx.save();

  // underbelly glow
  const bg = cx.createRadialGradient(x, y + s * 0.55, 0, x, y + s * 0.55, s * 1.6);
  bg.addColorStop(0, `rgba(40,230,90,${0.38 * p})`);
  bg.addColorStop(1,  'rgba(40,230,90,0)');
  cx.fillStyle = bg;
  cx.beginPath(); cx.ellipse(x, y + s * 0.5, s * 1.6, s * 0.7, 0, 0, Math.PI * 2); cx.fill();

  // saucer rim
  cx.fillStyle = '#145c24';
  cx.beginPath(); cx.ellipse(x, y + s * 0.46, s, s * 0.27, 0, 0, Math.PI * 2); cx.fill();

  // saucer top face
  cx.fillStyle = '#1d9438';
  cx.beginPath(); cx.ellipse(x, y + s * 0.30, s * 0.80, s * 0.20, 0, 0, Math.PI * 2); cx.fill();

  // dome (upper half only)
  cx.fillStyle = '#30d05a';
  cx.beginPath(); cx.ellipse(x, y + s * 0.24, s * 0.40, s * 0.34, 0, Math.PI, 0, true); cx.fill();

  // 3 underside lights
  for (let i = -1; i <= 1; i++) {
    cx.fillStyle = `rgba(170,255,200,${0.55 + 0.45 * p})`;
    cx.beginPath(); cx.arc(x + i * s * 0.35, y + s * 0.52, 2.5, 0, Math.PI * 2); cx.fill();
  }

  cx.restore();
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw(ts) {
  if (lastTs === null) lastTs = ts;
  if (wallT0 === null) wallT0 = ts;
  const wallT = (ts - wallT0) / 1000;

  if (!paused) tAccum += ts - lastTs;
  lastTs = ts;

  let t = tAccum / 250; // ÷250ms → 2× original speed

  // clamp to next pause point and trigger pause
  if (nextPauseIdx < PAUSE_POINTS.length && t >= PAUSE_POINTS[nextPauseIdx]) {
    tAccum = PAUSE_POINTS[nextPauseIdx] * 250;
    t = PAUSE_POINTS[nextPauseIdx];
    paused = true;
  }

  cx.clearRect(0,0,W,H);

  // Sky
  const skyG=cx.createLinearGradient(0,0,0,H);
  skyG.addColorStop(0,'#07091c'); skyG.addColorStop(0.55,'#040813'); skyG.addColorStop(1,'#020309');
  cx.fillStyle=skyG; cx.fillRect(0,0,W,H);

  // ── Derived values ───────────────────────────────────────────────────────
  const skyA       = fade(t,0,2.0);
  const zoomFade   = fade(t,ZOOM_A,ZOOM_B);
  const conA       = fade(t,0.5,1.8) * (1-zoomFade);
  const disc0A     = fade(t,DISC0_A,DISC0_B);
  const discArrA   = fade(t,DISCARR_A,DISCARR_B) * (1-fade(t,DISCARR_FA,DISCARR_FB));
  const ceresN     = Math.floor(fade(t,CER0,CER_END)*18); // 0-18 extra dots (indices 1-18)
  const glareScale = 1.0;
  const errEmph    = fade(t,EMPH_A,EMPH_B);
  const oldOut     = 1-fade(t,REDRAW_A,REDRAW_B);
  const ellipseA   = fade(t,ELLIPSE_A,ELLIPSE_B)*oldOut;
  const errorA     = fade(t,ERROR_A,ERROR_B)*oldOut;
  const lsqA       = fade(t,LSQ_IN_A,LSQ_IN_B);
  const newErrA    = fade(t,NEWERR_A,NEWERR_B);
  const sunZoomF   = fade(t,SUNZOOM_A,SUNZOOM_B);
  const extEll2A   = fade(t,EXTELL2_A,EXTELL2_B);
  const predictA   = fade(t,PREDICT_A,PREDICT_B);

  // Precompute predicted position for scene-13 camera targeting
  let _predX = SUN.rx*W, _predY = SUN.ry*H;
  {
    const _c=getLSQOrbit();
    if (_c) {
      const _l=CERES.reduce((a,b)=>a.rx<b.rx?a:b);
      const _r=CERES.reduce((a,b)=>a.rx>b.rx?a:b);
      let _aL=Math.atan2(_l.ry*H-_c.cy,_l.rx*W-_c.cx);
      let _aR=Math.atan2(_r.ry*H-_c.cy,_r.rx*W-_c.cx);
      if (_aR<=_aL) _aR+=Math.PI*2;
      const _pAng=_aR+Math.PI*0.105;
      _predX=_c.cx+_c.r*Math.cos(_pAng);
      _predY=_c.cy+_c.r*Math.sin(_pAng);
    }
  }
  // Scene 13 camera: aim at midpoint 42% toward prediction from sun
  const _cam2FX=lerp(SUN.rx,_predX/W,0.42);
  const _cam2FY=lerp(SUN.ry,_predY/H,0.42);
  const camFX   =lerp(lerp(CAM0.fx,CAM1.fx,zoomFade),_cam2FX,sunZoomF)*W;
  const camFY   =lerp(lerp(CAM0.fy,CAM1.fy,zoomFade),_cam2FY,sunZoomF)*H;
  const camZoom =lerp(lerp(CAM0.zoom,CAM1.zoom,zoomFade),CAM2.zoom,sunZoomF);
  const camAngle=lerp(lerp(CAM0.angle,CAM1.angle,zoomFade),CAM2.angle,sunZoomF);
  const lw      =1/camZoom;

  const sx=SUN.rx*W, sy=SUN.ry*H;
  const sunR  =Math.min(W,H)*0.050;
  const glareR=Math.min(W,H)*0.46*glareScale;

  // ── Camera transform ─────────────────────────────────────────────────────
  cx.save();
  cx.translate(W/2,H/2);
  cx.rotate(camAngle);
  cx.scale(camZoom,camZoom);
  cx.translate(-camFX,-camFY);

  // Milky Way
  cx.save();
  cx.globalAlpha=1-zoomFade*0.6;
  const mw=cx.createLinearGradient(W*0.1,H*0.05,W*0.65,H*0.85);
  mw.addColorStop(0,'rgba(70,85,135,0)'); mw.addColorStop(0.35,'rgba(70,85,135,0.055)');
  mw.addColorStop(0.5,'rgba(70,85,135,0.08)'); mw.addColorStop(0.65,'rgba(70,85,135,0.055)');
  mw.addColorStop(1,'rgba(70,85,135,0)');
  cx.fillStyle=mw; cx.fillRect(0,0,W,H);
  cx.restore();

  // ── Stars ────────────────────────────────────────────────────────────────
  for (const s of STARS) {
    const dx=s.rx-SUN.rx, dy=s.ry-SUN.ry;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const inner=0.20*glareScale, outer=0.40*glareScale;
    if (dist<inner) continue;
    let sa=s.a*skyA*(0.78+0.22*Math.sin(t*s.sp+s.ph));
    if (dist<outer) sa*=(dist-inner)/(outer-inner);
    const [r,g,b]=hex2rgb(s.col);
    cx.beginPath(); cx.arc(s.rx*W,s.ry*H,s.r*lw,0,Math.PI*2);
    cx.fillStyle=`rgba(${r},${g},${b},${sa})`; cx.fill();
  }

  // ── Sun ──────────────────────────────────────────────────────────────────
  {const g=cx.createRadialGradient(sx,sy,sunR,sx,sy,glareR);
  g.addColorStop(0,`rgba(255,215,90,${0.22*glareScale})`);
  g.addColorStop(0.18,`rgba(255,175,45,${0.14*glareScale})`);
  g.addColorStop(0.45,`rgba(255,130,20,${0.07*glareScale})`);
  g.addColorStop(0.72,`rgba(255,85,10,${0.03*glareScale})`);
  g.addColorStop(1,'rgba(255,50,0,0)');
  cx.fillStyle=g; cx.beginPath(); cx.arc(sx,sy,glareR,0,Math.PI*2); cx.fill();}
  {const g=cx.createRadialGradient(sx,sy,0,sx,sy,sunR*5);
  g.addColorStop(0,'rgba(255,250,210,0.85)'); g.addColorStop(0.35,'rgba(255,230,130,0.40)');
  g.addColorStop(0.65,'rgba(255,200,70,0.15)'); g.addColorStop(1,'rgba(255,150,30,0)');
  cx.fillStyle=g; cx.beginPath(); cx.arc(sx,sy,sunR*5,0,Math.PI*2); cx.fill();}
  {const g=cx.createRadialGradient(sx-sunR*0.25,sy-sunR*0.2,0,sx,sy,sunR);
  g.addColorStop(0,'#FFFFFF'); g.addColorStop(0.25,'#FFFBE0');
  g.addColorStop(0.7,'#FFDF60'); g.addColorStop(1,'#FFA820');
  cx.fillStyle=g; cx.beginPath(); cx.arc(sx,sy,sunR,0,Math.PI*2); cx.fill();}
  cx.save(); cx.translate(sx,sy);
  for (let i=0;i<16;i++) {
    const a=(i/16)*Math.PI*2+t*0.04;
    const len=sunR*(0.8+0.25*Math.sin(t*1.1+i*0.7));
    cx.beginPath();
    cx.moveTo(Math.cos(a)*sunR*0.92,Math.sin(a)*sunR*0.92);
    cx.lineTo(Math.cos(a)*(sunR+len),Math.sin(a)*(sunR+len));
    cx.strokeStyle=`rgba(255,225,100,${0.35+0.1*Math.sin(t*0.9+i)})`;
    cx.lineWidth=1.2*lw; cx.stroke();
  }
  cx.restore();

  // ── Taurus ───────────────────────────────────────────────────────────────
  if (conA>0) {
    cx.save(); cx.globalAlpha=conA*0.38; cx.strokeStyle='#3355AA'; cx.lineWidth=0.9*lw;
    for (const [a,b] of TAU_L) {
      cx.beginPath(); cx.moveTo(TAU_S[a].rx*W,TAU_S[a].ry*H);
      cx.lineTo(TAU_S[b].rx*W,TAU_S[b].ry*H); cx.stroke();
    }
    cx.restore();
    cx.save(); cx.globalAlpha=conA;
    for (const s of TAU_S) {
      const x=s.rx*W,y=s.ry*H;
      const [r,g,b]=hex2rgb(s.c);
      const gl=cx.createRadialGradient(x,y,0,x,y,s.r*5.5);
      gl.addColorStop(0,`rgba(${r},${g},${b},0.65)`);
      gl.addColorStop(0.35,`rgba(${r},${g},${b},0.2)`);
      gl.addColorStop(1,`rgba(${r},${g},${b},0)`);
      cx.fillStyle=gl; cx.beginPath(); cx.arc(x,y,s.r*5.5,0,Math.PI*2); cx.fill();
      cx.fillStyle=s.c; cx.beginPath(); cx.arc(x,y,s.r*lw,0,Math.PI*2); cx.fill();
    }
    cx.restore();
  }

  // ── Ceres trail ──────────────────────────────────────────────────────────
  if (disc0A>0 && ceresN>0) {
    cx.save(); cx.globalAlpha=0.40*disc0A; cx.strokeStyle='#FFCC44';
    cx.lineWidth=1.6*lw; cx.setLineDash([4*lw,4*lw]);
    cx.beginPath(); cx.moveTo(CERES[0].rx*W,CERES[0].ry*H);
    for (let i=1;i<=ceresN;i++) cx.lineTo(CERES[i].rx*W,CERES[i].ry*H);
    cx.stroke(); cx.setLineDash([]); cx.restore();
  }

  // ── Ceres dots ───────────────────────────────────────────────────────────

  // Dot 0 — scene 2 first sighting (HILITE_SET member, handled separately)
  if (disc0A>0) {
    const pt=CERES[0]; const px=pt.rx*W,py=pt.ry*H;
    const dotR=4*lw; const dotCol='#FFD060';
    const [r,g,b]=hex2rgb(dotCol);
    cx.save(); cx.globalAlpha=disc0A;
    const gl=cx.createRadialGradient(px,py,0,px,py,dotR*5.5);
    gl.addColorStop(0,`rgba(${r},${g},${b},0.70)`);
    gl.addColorStop(0.4,`rgba(${r},${g},${b},0.22)`);
    gl.addColorStop(1,`rgba(${r},${g},${b},0)`);
    cx.fillStyle=gl; cx.beginPath(); cx.arc(px,py,dotR*5.5,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(px,py,dotR,0,Math.PI*2);
    cx.fillStyle=dotCol; cx.fill();
    cx.strokeStyle='rgba(255,255,255,0.55)'; cx.lineWidth=0.8*lw; cx.stroke();
    cx.restore();
  }

  // Discovery arrow — solid red callout from bottom-left pointing at dot 0
  if (discArrA>0) {
    const pt=CERES[0]; const px=pt.rx*W,py=pt.ry*H;
    const offX=-160*lw, offY=130*lw;
    const startX=px+offX, startY=py+offY;
    const ang=Math.atan2(-offY,-offX); // direction: start → dot
    const ahL=70*lw;   // arrowhead length
    const ahW=38*lw;   // arrowhead half-width
    const shW=14*lw;   // shaft half-width
    const baseX=px-Math.cos(ang)*ahL, baseY=py-Math.sin(ang)*ahL;
    const perpX=-Math.sin(ang), perpY=Math.cos(ang);
    cx.save(); cx.globalAlpha=discArrA;
    cx.fillStyle='#FF2222';
    cx.shadowColor='rgba(255,60,60,0.90)'; cx.shadowBlur=22*lw;
    cx.beginPath();
    cx.moveTo(px, py);
    cx.lineTo(baseX+perpX*ahW, baseY+perpY*ahW);
    cx.lineTo(baseX+perpX*shW, baseY+perpY*shW);
    cx.lineTo(startX+perpX*shW, startY+perpY*shW);
    cx.lineTo(startX-perpX*shW, startY-perpY*shW);
    cx.lineTo(baseX-perpX*shW, baseY-perpY*shW);
    cx.lineTo(baseX-perpX*ahW, baseY-perpY*ahW);
    cx.closePath(); cx.fill();
    cx.restore();
  }

  // Extra dots 1-18 — scene 3 subsequent observations
  for (let i=1;i<=ceresN;i++) {
    const pt=CERES[i];
    const px=pt.rx*W,py=pt.ry*H;
    const dotR=4*lw;
    const dotCol='#FFD060';
    const [r,g,b]=hex2rgb(dotCol);
    const gl=cx.createRadialGradient(px,py,0,px,py,dotR*5.5);
    gl.addColorStop(0,`rgba(${r},${g},${b},0.70)`);
    gl.addColorStop(0.4,`rgba(${r},${g},${b},0.22)`);
    gl.addColorStop(1,`rgba(${r},${g},${b},0)`);
    cx.fillStyle=gl; cx.beginPath(); cx.arc(px,py,dotR*5.5,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(px,py,dotR,0,Math.PI*2);
    cx.fillStyle=dotCol; cx.fill();
    cx.strokeStyle='rgba(255,255,255,0.55)'; cx.lineWidth=0.8*lw; cx.stroke();
  }

  // ── First ellipse (3-point circumscribed, fades out) ─────────────────────
  if (ellipseA>0) {
    const circ=getOrbit();
    if (circ) {
      const sa=Math.atan2(CERES[HILITE[0]].ry*H-circ.cy,CERES[HILITE[0]].rx*W-circ.cx);
      cx.save();
      cx.globalAlpha=Math.min(1,ellipseA*1.4);
      cx.strokeStyle='rgba(80,210,255,0.80)';
      cx.lineWidth=2.5*lw;
      cx.shadowColor='rgba(60,180,255,0.6)'; cx.shadowBlur=10*lw;
      cx.beginPath(); cx.arc(circ.cx,circ.cy,circ.r,sa,sa+Math.PI*2,false); cx.stroke();
      cx.restore();
    }
  }

  // ── Error lines — 16 points, first fit (fades out) ───────────────────────
  if (errorA>0) {
    const circ=getOrbit();
    if (circ) {
      const effEmph=errEmph*oldOut;
      cx.save();
      cx.globalAlpha=errorA;
      cx.strokeStyle='#FF2222';
      cx.lineWidth=lerp(3.0,5.5,effEmph)*lw;
      cx.shadowColor='rgba(255,60,60,0.9)';
      cx.shadowBlur=lerp(4,22,effEmph)*lw;
      for (let i=0;i<19;i++) {
        if (HILITE_SET.has(i)) continue;
        const px=CERES[i].rx*W,py=CERES[i].ry*H;
        const dx=px-circ.cx,dy=py-circ.cy,d=Math.sqrt(dx*dx+dy*dy);
        const nx=circ.cx+dx/d*circ.r,ny=circ.cy+dy/d*circ.r;
        cx.beginPath(); cx.moveTo(px,py); cx.lineTo(nx,ny); cx.stroke();
      }
      cx.restore();
    }
  }

  // ── LSQ ellipse (better fit, sweeps left → right) ────────────────────────
  if (lsqA>0) {
    const circ=getLSQOrbit();
    if (circ) {
      const left  = CERES.reduce((a,b)=>a.rx<b.rx?a:b);
      const right = CERES.reduce((a,b)=>a.rx>b.rx?a:b);
      const angL  = Math.atan2(left.ry*H -circ.cy, left.rx*W -circ.cx);
      let   angR  = Math.atan2(right.ry*H-circ.cy, right.rx*W-circ.cx);
      if (angR<=angL) angR+=Math.PI*2;
      const sweep = angR-angL;
      cx.save();
      cx.globalAlpha=Math.min(1,lsqA*1.4);
      cx.strokeStyle='rgba(120,255,180,0.85)';
      cx.lineWidth=2.5*lw;
      cx.shadowColor='rgba(80,230,140,0.6)'; cx.shadowBlur=10*lw;
      cx.beginPath();
      cx.arc(circ.cx,circ.cy,circ.r, angL, angL+sweep*lsqA, false);
      cx.stroke();
      cx.restore();
    }
  }

  // ── New error lines — all 19 points, LSQ fit ─────────────────────────────
  if (newErrA>0) {
    const circ=getLSQOrbit();
    if (circ) {
      cx.save();
      cx.globalAlpha=newErrA;
      cx.strokeStyle='#FF2222';
      cx.lineWidth=3.5*lw;
      cx.shadowColor='rgba(255,60,60,0.9)'; cx.shadowBlur=14*lw;
      for (let i=0;i<19;i++) {
        const px=CERES[i].rx*W,py=CERES[i].ry*H;
        const dx=px-circ.cx,dy=py-circ.cy,d=Math.sqrt(dx*dx+dy*dy);
        const nx=circ.cx+dx/d*circ.r,ny=circ.cy+dy/d*circ.r;
        cx.beginPath(); cx.moveTo(px,py); cx.lineTo(nx,ny); cx.stroke();
      }
      cx.restore();
    }
  }

  // ── Extended orbit arc past sun + predicted reappearance ─────────────────
  if (extEll2A>0 || predictA>0) {
    const circ=getLSQOrbit();
    if (circ) {
      const left  = CERES.reduce((a,b)=>a.rx<b.rx?a:b);
      const right = CERES.reduce((a,b)=>a.rx>b.rx?a:b);
      const angL  = Math.atan2(left.ry*H -circ.cy, left.rx*W -circ.cx);
      let   angR  = Math.atan2(right.ry*H-circ.cy, right.rx*W-circ.cx);
      if (angR<=angL) angR+=Math.PI*2;
      const PRED_EXT = Math.PI*0.105;
      const predX = _predX, predY = _predY;

      if (extEll2A>0) {
        cx.save();
        cx.globalAlpha=Math.min(1,extEll2A*1.4);
        cx.strokeStyle='rgba(120,255,180,0.70)';
        cx.lineWidth=2.5*lw;
        cx.shadowColor='rgba(80,230,140,0.6)'; cx.shadowBlur=10*lw;
        cx.setLineDash([8*lw,5*lw]);
        cx.beginPath();
        cx.arc(circ.cx,circ.cy,circ.r, angR, angR+PRED_EXT*extEll2A, false);
        cx.stroke();
        cx.setLineDash([]);
        cx.restore();
      }

      if (predictA>0) {
        // position marker ring
        cx.save();
        cx.globalAlpha=predictA;
        cx.strokeStyle='#FF2222'; cx.lineWidth=4*lw;
        cx.shadowColor='rgba(255,60,60,0.9)'; cx.shadowBlur=20*lw;
        cx.beginPath(); cx.arc(predX,predY,10*lw,0,Math.PI*2); cx.stroke();
        cx.restore();
        // big solid red arrow from bottom-left pointing to prediction point
        {
          const offX=-160*lw, offY=130*lw;
          const startX=predX+offX, startY=predY+offY;
          const ang=Math.atan2(-offY,-offX);
          const ahL=70*lw, ahW=38*lw, shW=14*lw;
          const baseX=predX-Math.cos(ang)*ahL, baseY=predY-Math.sin(ang)*ahL;
          const perpX=-Math.sin(ang), perpY=Math.cos(ang);
          cx.save(); cx.globalAlpha=predictA;
          cx.fillStyle='#FF2222';
          cx.shadowColor='rgba(255,60,60,0.90)'; cx.shadowBlur=22*lw;
          cx.beginPath();
          cx.moveTo(predX,predY);
          cx.lineTo(baseX+perpX*ahW, baseY+perpY*ahW);
          cx.lineTo(baseX+perpX*shW, baseY+perpY*shW);
          cx.lineTo(startX+perpX*shW, startY+perpY*shW);
          cx.lineTo(startX-perpX*shW, startY-perpY*shW);
          cx.lineTo(baseX-perpX*shW, baseY-perpY*shW);
          cx.lineTo(baseX-perpX*ahW, baseY-perpY*ahW);
          cx.closePath(); cx.fill();
          cx.restore();
        }
        // big red question mark to the right of prediction point
        cx.save();
        cx.globalAlpha=predictA;
        cx.fillStyle='#FF2222';
        cx.shadowColor='rgba(255,60,60,0.9)'; cx.shadowBlur=24*lw;
        cx.font=`bold ${(70*lw).toFixed(2)}px sans-serif`;
        cx.textAlign='left'; cx.textBaseline='middle';
        cx.fillText('?', predX+18*lw, predY);
        cx.restore();
      }
    }
  }

  cx.restore(); // end camera

  // ── Horizon silhouette (fades out during zoom) ────────────────────────────
  const horizA=skyA*(1-zoomFade);
  if (horizA>0.01) {
    cx.save(); cx.globalAlpha=horizA;
    const gg=cx.createLinearGradient(0,H*0.875,0,H);
    gg.addColorStop(0,'rgba(2,3,9,0)'); gg.addColorStop(0.35,'rgba(2,3,9,0.88)');
    gg.addColorStop(1,'#010207');
    cx.fillStyle=gg; cx.fillRect(0,H*0.875,W,H*0.125);
    cx.fillStyle='#01020a';
    cx.beginPath();
    cx.moveTo(0,H); cx.lineTo(0,H*0.910); cx.lineTo(W*0.075,H*0.910);
    cx.lineTo(W*0.090,H*0.900); cx.lineTo(W*0.135,H*0.900);
    cx.arc(W*0.160,H*0.895,W*0.026,Math.PI,0,false);
    cx.lineTo(W*0.200,H*0.900); cx.lineTo(W*0.215,H*0.900);
    cx.lineTo(W*0.222,H*0.882); cx.lineTo(W*0.228,H*0.882);
    cx.lineTo(W*0.235,H*0.900); cx.lineTo(W*0.280,H*0.905);
    cx.lineTo(W*0.340,H*0.910); cx.lineTo(W,H*0.918);
    cx.lineTo(W,H); cx.closePath(); cx.fill();
    cx.restore();
  }

  // ── UFO pause indicator ───────────────────────────────────────────────────
  if (paused) {
    const ufoX = W/2 - 24, ufoY = 38;
    drawUFO(ufoX, ufoY, wallT, 12);
    cx.save();
    cx.fillStyle='rgba(130,255,170,0.92)';
    cx.font='bold 13px monospace';
    cx.textAlign='left'; cx.textBaseline='middle';
    cx.fillText(`scene ${nextPauseIdx + 1}`, ufoX + 17, ufoY + 4);
    cx.restore();
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
